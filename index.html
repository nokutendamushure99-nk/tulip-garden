<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tulip Garden 🌸</title>
<style>
body { margin:0; overflow:hidden; background:#0a1f44; }
#msg {
 position:absolute;
 bottom:20px;
 left:50%;
 transform:translateX(-50%);
 background:rgba(0,0,0,0.6);
 color:white;
 padding:10px 20px;
 border-radius:20px;
 display:none;
}
</style>
</head>

<body>
<div id="msg"></div>

<script type="importmap">
{
 "imports": {
  "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.152.2/examples/jsm/"
 }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

/* BASIC SETUP */
const scene = new THREE.Scene();
scene.background = new THREE.Color("#0a1f44");

const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight,0.1,100);
camera.position.set(4,3,6);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);

/* LIGHT */
scene.add(new THREE.AmbientLight(0xffffff,0.7));
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

/* GROUND */
const ground = new THREE.Mesh(
 new THREE.CircleGeometry(8,32),
 new THREE.MeshStandardMaterial({color:0x4caf50})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* LOADER */
const loader = new GLTFLoader();
const tulips = [];

const messages = [
 "this one is for you",
 "you deserve softness",
 "gentle and rare 🌸"
];

/* TRY LOAD MODEL */
loader.load(
"https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/Flower/glTF/Flower.gltf",

(gltf)=>{
 const model = gltf.scene;

 for(let i=0;i<20;i++){
   const t = model.clone(true);
   t.position.set((Math.random()-0.5)*6,0,(Math.random()-0.5)*6);
   t.scale.set(0.5,0.5,0.5);
   t.userData.msg = messages[Math.floor(Math.random()*messages.length)];

   scene.add(t);
   tulips.push(t);
 }

},

undefined,

/* FALLBACK (IMPORTANT) */
()=>{
 console.log("model failed, using backup flowers");

 for(let i=0;i<20;i++){
   const geo = new THREE.ConeGeometry(0.2,0.5,6);
   const mat = new THREE.MeshStandardMaterial({color:0xff6699});
   const flower = new THREE.Mesh(geo,mat);

   flower.position.set((Math.random()-0.5)*6,0.25,(Math.random()-0.5)*6);
   flower.userData.msg = "still for you 🌸";

   scene.add(flower);
   tulips.push(flower);
 }
});

/* CLICK */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click",(e)=>{
 mouse.x = (e.clientX/innerWidth)*2-1;
 mouse.y = -(e.clientY/innerHeight)*2+1;

 raycaster.setFromCamera(mouse,camera);
 const hit = raycaster.intersectObjects(tulips,true);

 if(hit.length){
   const msg = document.getElementById("msg");
   msg.innerText = hit[0].object.parent?.userData.msg || hit[0].object.userData.msg;
   msg.style.display="block";
   setTimeout(()=>msg.style.display="none",2500);
 }
});

/* ANIMATE */
let t=0;
function animate(){
 requestAnimationFrame(animate);
 t+=0.01;

 tulips.forEach(f=>{
   f.rotation.z = Math.sin(t + f.position.x)*0.05;
 });

 renderer.render(scene,camera);
}
animate();

/* RESIZE */
addEventListener("resize",()=>{
 camera.aspect = innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
