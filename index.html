<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Enchanted Tulip Garden | For a Special Girl</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Dancing Script', 'Georgia', serif;
        }
        /* Heartfelt message overlay (CSS2D will show main message, but also an elegant ground note) */
        .controls-note {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,240,0.8);
            background: rgba(0,0,0,0.35);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-family: monospace;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 10;
            font-weight: 300;
            letter-spacing: 0.5px;
        }
        @media (max-width: 600px) {
            .controls-note { font-size: 9px; bottom: 12px; right: 12px; }
        }
    </style>
</head>
<body>
    <div class="controls-note">
        🌸 Drag to explore | Scroll to zoom in on the tulips
    </div>

    <!-- Import Three.js core and add-ons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- setup scene with atmospheric depth ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x081c3b); // deep enchanting dusk
        scene.fog = new THREE.FogExp2(0x081c3b, 0.022);

        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5.2, 4.2, 6.8);
        camera.lookAt(0, 1.2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // CSS2 renderer for the tender message
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- Controls for immersive interaction ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.2;
        controls.rotateSpeed = 1.0;
        controls.target.set(0, 1.3, 0);

        // --- LIGHTS for vivid 3D realism ---
        const ambientLight = new THREE.AmbientLight(0x3c4a6e, 0.55);
        scene.add(ambientLight);
        
        // Main directional light (sun)
        const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.3);
        mainLight.position.set(4.5, 7.2, 3);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 12;
        mainLight.shadow.camera.left = -5;
        mainLight.shadow.camera.right = 5;
        mainLight.shadow.camera.top = 5;
        mainLight.shadow.camera.bottom = -5;
        scene.add(mainLight);
        
        // Fill light from below (makes petals glow)
        const fillLight = new THREE.PointLight(0xffaa77, 0.6);
        fillLight.position.set(0, -0.8, 0);
        scene.add(fillLight);
        
        // Back rim light for 3D edge definition
        const rimLight = new THREE.PointLight(0xffbc88, 0.75);
        rimLight.position.set(-2.2, 2.5, -4);
        scene.add(rimLight);
        
        // Colorful magical fill for saturation
        const colorFill = new THREE.PointLight(0xddaaff, 0.5);
        colorFill.position.set(2, 1.8, 2.5);
        scene.add(colorFill);
        
        // Additional warm fill from the front-right
        const warmFill = new THREE.PointLight(0xffcc99, 0.45);
        warmFill.position.set(3, 1.5, 2);
        scene.add(warmFill);
        
        // --- Ground: soft meadow with subtle shimmer ---
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x4c9e4a, roughness: 0.85, metalness: 0.05 });
        const groundPlane = new THREE.Mesh(new THREE.CircleGeometry(8.5, 32), groundMat);
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.08;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // Grass blades as tiny points
        const grassCount = 1200;
        const grassPositions = new Float32Array(grassCount * 3);
        for (let i = 0; i < grassCount; i++) {
            const radius = 7.8 * Math.sqrt(Math.random());
            const angle = Math.random() * Math.PI * 2;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            grassPositions[i*3] = x;
            grassPositions[i*3+1] = -0.05 + Math.random() * 0.1;
            grassPositions[i*3+2] = z;
        }
        const grassGeo = new THREE.BufferGeometry();
        grassGeo.setAttribute('position', new THREE.BufferAttribute(grassPositions, 3));
        const grassPoints = new THREE.Points(grassGeo, new THREE.PointsMaterial({ color: 0x8bc34a, size: 0.045, transparent: true, opacity: 0.7 }));
        scene.add(grassPoints);
        
        // ========== REALISTIC TULIP PETAL GENERATOR (LatheGeometry based) ==========
        // Creates a beautifully curved, organic petal shape similar to real tulip petals
        function createRealisticPetal(color, isInner = false, tintVariation = 0) {
            // Define curve profile for petal: from base to tip, with wider mid-section
            const points = [];
            // Profile: height from 0 to 1, radius at each level (rounded, pointed tip)
            points.push(new THREE.Vector2(0.0, 0.0));    // base
            points.push(new THREE.Vector2(0.22, 0.2));
            points.push(new THREE.Vector2(0.32, 0.4));
            points.push(new THREE.Vector2(0.34, 0.6));
            points.push(new THREE.Vector2(0.28, 0.8));
            points.push(new THREE.Vector2(0.12, 0.94));
            points.push(new THREE.Vector2(0.02, 1.0));   // tip
            
            // For inner petals, slightly narrower
            if (isInner) {
                points.forEach(p => { p.x *= 0.82; });
            }
            
            const latheGeo = new THREE.LatheGeometry(points, 24);
            const materialColor = new THREE.Color(color);
            // Slight random shift for natural variety
            if (tintVariation) {
                materialColor.offsetHSL(0, (tintVariation - 0.5) * 0.12, (tintVariation - 0.5) * 0.08);
            }
            const material = new THREE.MeshStandardMaterial({
                color: materialColor,
                roughness: 0.28,
                metalness: 0.1,
                emissive: materialColor,
                emissiveIntensity: 0.12,
                flatShading: false
            });
            // Special case for white tulips: pearly shimmer
            if (color === 0xfff5f0 || color === 0xfff0f5 || (color >= 0xffeef0 && color <= 0xfff5ff)) {
                material.emissiveIntensity = 0.08;
                material.roughness = 0.32;
            }
            const petal = new THREE.Mesh(latheGeo, material);
            petal.castShadow = true;
            petal.receiveShadow = false;
            return petal;
        }
        
        // ========== CREATE FULL TULIP WITH STEM, LEAVES, AND 6 REALISTIC PETALS ==========
        function createTulip(colorHex, posX, posZ, stemHeightVar = 1.0, scaleVar = 0.92) {
            const group = new THREE.Group();
            const stemHeight = 1.18 * stemHeightVar;
            const stemBottomRad = 0.095 * scaleVar;
            const stemTopRad = 0.055 * scaleVar;
            
            // Stem: subtle gradient via material
            const stemMat = new THREE.MeshStandardMaterial({ color: 0x5fad4a, roughness: 0.5, metalness: 0.15 });
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(stemTopRad, stemBottomRad, stemHeight, 10), stemMat);
            stem.position.y = stemHeight / 2;
            stem.castShadow = true;
            group.add(stem);
            
            // Leaves: elegant, curved using rotated boxes and slight bend illusion
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x6bb84b, roughness: 0.55, emissive: 0x2a662a, emissiveIntensity: 0.06 });
            // Leaf 1
            const leaf1 = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.72, 0.07), leafMat);
            leaf1.position.set(0.14, stemHeight * 0.45, 0.02);
            leaf1.rotation.z = 0.65;
            leaf1.rotation.x = 0.25;
            leaf1.castShadow = true;
            group.add(leaf1);
            // Leaf 2 (slightly lower opposite)
            const leaf2 = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.7, 0.07), leafMat);
            leaf2.position.set(-0.13, stemHeight * 0.48, -0.02);
            leaf2.rotation.z = -0.6;
            leaf2.rotation.x = -0.2;
            leaf2.castShadow = true;
            group.add(leaf2);
            
            // Flower head group
            const flowerGroup = new THREE.Group();
            flowerGroup.position.y = stemHeight;
            
            // Petal arrangement: 6 petals total (3 outer, 3 inner) for classic tulip look
            const angles = [0, 60, 120, 180, 240, 300].map(deg => deg * Math.PI / 180);
            const baseColor = colorHex;
            
            // Outer petals: more outward curve
            for (let i = 0; i < 3; i++) {
                const angle = angles[i];
                const petal = createRealisticPetal(baseColor, false, (i * 0.1));
                // Scale petal for natural proportion
                petal.scale.set(0.65, 0.9, 0.55);
                petal.rotation.y = angle;
                petal.rotation.x = 0.45;
                petal.rotation.z = angle * 0.25;
                const radius = 0.44;
                const xOff = Math.cos(angle) * radius;
                const zOff = Math.sin(angle) * radius;
                petal.position.set(xOff, 0.02, zOff);
                flowerGroup.add(petal);
            }
            
            // Inner petals: slightly smaller, more upright
            for (let i = 3; i < 6; i++) {
                const angle = angles[i];
                const petal = createRealisticPetal(baseColor, true, (i * 0.08));
                petal.scale.set(0.59, 0.85, 0.52);
                petal.rotation.y = angle + 0.3;
                petal.rotation.x = 0.28;
                petal.rotation.z = angle * 0.2;
                const radius = 0.32;
                const xOff = Math.cos(angle) * radius;
                const zOff = Math.sin(angle) * radius;
                petal.position.set(xOff, 0.1, zOff);
                flowerGroup.add(petal);
            }
            
            // Central stamen group (realistic yellow/orange stamens)
            const stamenGroup = new THREE.Group();
            const stamenMat = new THREE.MeshStandardMaterial({ color: 0xffcc55, emissive: 0xffaa44, emissiveIntensity: 0.28 });
            for (let i = 0; i < 8; i++) {
                const stamen = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.026, 0.26, 6), stamenMat);
                const ang = (i / 8) * Math.PI * 2;
                const rad = 0.21;
                stamen.position.set(Math.cos(ang) * rad, 0.25, Math.sin(ang) * rad);
                stamen.castShadow = true;
                stamenGroup.add(stamen);
                // tiny anther tip
                const anther = new THREE.Mesh(new THREE.SphereGeometry(0.038, 8, 8), new THREE.MeshStandardMaterial({ color: 0xdd8844, emissive: 0xcc6622, emissiveIntensity: 0.2 }));
                anther.position.set(Math.cos(ang) * rad, 0.39, Math.sin(ang) * rad);
                anther.castShadow = true;
                stamenGroup.add(anther);
            }
            // Central pistil (elegant)
            const pistilMat = new THREE.MeshStandardMaterial({ color: 0xccaa77, emissive: 0xaa7744, emissiveIntensity: 0.15 });
            const pistil = new THREE.Mesh(new THREE.CylinderGeometry(0.048, 0.052, 0.32, 8), pistilMat);
            pistil.position.y = 0.24;
            pistil.castShadow = true;
            stamenGroup.add(pistil);
            flowerGroup.add(stamenGroup);
            
            // Calyx (green base)
            const calyxMat = new THREE.MeshStandardMaterial({ color: 0x6cae44, roughness: 0.6 });
            const calyx = new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.29, 0.13, 7), calyxMat);
            calyx.position.y = -0.09;
            calyx.castShadow = true;
            flowerGroup.add(calyx);
            
            group.add(flowerGroup);
            
            // Animation data for gentle sway
            group.userData = {
                swaySpeed: 0.45 + Math.random() * 0.55,
                swayAmp: 0.009,
                phase: Math.random() * Math.PI * 2,
                baseRotY: 0
            };
            
            group.position.set(posX, 0, posZ);
            return group;
        }
        
        // --- Vivid tulip color palette: Red, Yellow, White, Purple (intense and beautiful)---
        const vividColors = [
            0xff4d4d,  // radiant red
            0xffd966,  // golden yellow
            0xfff2f0,  // pure white with soft warmth
            0xcd96ff   // dreamy purple
        ];
        
        // Create positions for a natural meadow layout (clusters, rings)
        const tulipPositions = [];
        // Generate 28 tulips in a harmonious composition
        const clusterCenters = [
            { x: -1.8, z: -1.2, count: 3, radius: 0.9 },
            { x: 2.0, z: 1.4, count: 4, radius: 1.0 },
            { x: 0.5, z: -2.0, count: 3, radius: 0.8 },
            { x: -0.8, z: 2.1, count: 3, radius: 0.9 },
            { x: 3.2, z: -0.5, count: 3, radius: 0.9 },
            { x: -2.5, z: 1.5, count: 3, radius: 0.8 }
        ];
        
        // add random scatter in outer ring
        for (let i = 0; i < 12; i++) {
            const angle = Math.random() * Math.PI * 2;
            const rad = 4.2 + Math.random() * 1.8;
            const x = Math.cos(angle) * rad * (Math.random() > 0.3 ? 1 : 0.9);
            const z = Math.sin(angle) * rad * (Math.random() > 0.3 ? 1 : 0.9);
            tulipPositions.push({ x, z });
        }
        
        // add cluster positions
        clusterCenters.forEach(center => {
            for (let i = 0; i < center.count; i++) {
                const angleOff = Math.random() * Math.PI * 2;
                const rad = Math.random() * center.radius;
                const x = center.x + Math.cos(angleOff) * rad;
                const z = center.z + Math.sin(angleOff) * rad;
                tulipPositions.push({ x, z });
            }
        });
        
        // ensure no two tulips overlap too closely
        for (let i = 0; i < tulipPositions.length; i++) {
            for (let j = i+1; j < tulipPositions.length; j++) {
                const dx = tulipPositions[i].x - tulipPositions[j].x;
                const dz = tulipPositions[i].z - tulipPositions[j].z;
                if (Math.hypot(dx, dz) < 0.65) {
                    tulipPositions[j].x += (Math.random() - 0.5) * 0.55;
                    tulipPositions[j].z += (Math.random() - 0.5) * 0.55;
                }
            }
        }
        
        // Assign colors: ensure all four colors are well represented
        const colorAssign = [];
        for (let i = 0; i < tulipPositions.length; i++) {
            let col;
            if (i % 4 === 0) col = vividColors[0];
            else if (i % 4 === 1) col = vividColors[1];
            else if (i % 4 === 2) col = vividColors[2];
            else col = vividColors[3];
            colorAssign.push(col);
        }
        // slight shuffle for organic mix
        for (let i = colorAssign.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [colorAssign[i], colorAssign[j]] = [colorAssign[j], colorAssign[i]];
        }
        
        const allTulips = [];
        tulipPositions.forEach((pos, idx) => {
            const stemVar = 0.86 + Math.random() * 0.38;
            const scaleVar = 0.85 + Math.random() * 0.28;
            const tulip = createTulip(colorAssign[idx], pos.x, pos.z, stemVar, scaleVar);
            scene.add(tulip);
            allTulips.push(tulip);
        });
        
        // Add a few extra prominent tulips near center for emphasis
        const centerSpecials = [
            { x: -0.9, z: -0.6, col: vividColors[0] },
            { x: 0.8, z: 0.7, col: vividColors[1] },
            { x: 0.2, z: -1.0, col: vividColors[2] },
            { x: -0.3, z: 1.2, col: vividColors[3] },
            { x: 1.3, z: -0.4, col: vividColors[0] }
        ];
        centerSpecials.forEach(sp => {
            const tulip = createTulip(sp.col, sp.x, sp.z, 1.02, 0.96);
            scene.add(tulip);
            allTulips.push(tulip);
        });
        
        // --- Magical floating particles (sparkles and love motes)---
        const sparkleCount = 1800;
        const sparkleGeo = new THREE.BufferGeometry();
        const sparklePos = new Float32Array(sparkleCount * 3);
        for (let i = 0; i < sparkleCount; i++) {
            sparklePos[i*3] = (Math.random() - 0.5) * 13;
            sparklePos[i*3+1] = Math.random() * 3.8;
            sparklePos[i*3+2] = (Math.random() - 0.5) * 11;
        }
        sparkleGeo.setAttribute('position', new THREE.BufferAttribute(sparklePos, 3));
        const sparkleMat = new THREE.PointsMaterial({ color: 0xffbb88, size: 0.032, transparent: true, blending: THREE.AdditiveBlending });
        const sparkles = new THREE.Points(sparkleGeo, sparkleMat);
        scene.add(sparkles);
        
        // Floating heart dust
        const heartDustCount = 900;
        const heartDustGeo = new THREE.BufferGeometry();
        const heartPos = new Float32Array(heartDustCount * 3);
        for (let i = 0; i < heartDustCount; i++) {
            heartPos[i*3] = (Math.random() - 0.5) * 10;
            heartPos[i*3+1] = Math.random() * 3.2;
            heartPos[i*3+2] = (Math.random() - 0.5) * 8;
        }
        heartDustGeo.setAttribute('position', new THREE.BufferAttribute(heartPos, 3));
        const heartMat = new THREE.PointsMaterial({ color: 0xff88aa, size: 0.04, transparent: true, opacity: 0.65, blending: THREE.AdditiveBlending });
        const heartDust = new THREE.Points(heartDustGeo, heartMat);
        scene.add(heartDust);
        
        // Drifting tiny petals (sprites)
        function createFloatingPetalSprite(baseColor) {
            const canvas = document.createElement('canvas');
            canvas.width = 28;
            canvas.height = 28;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = baseColor;
            ctx.beginPath();
            ctx.ellipse(14, 12, 7, 10, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = 'rgba(255,210,180,0.7)';
            ctx.beginPath();
            ctx.ellipse(14, 8, 3.5, 5, 0, 0, Math.PI*2);
            ctx.fill();
            const texture = new THREE.CanvasTexture(canvas);
            return new THREE.SpriteMaterial({ map: texture, transparent: true, blending: THREE.AdditiveBlending });
        }
        const driftingPetals = [];
        const petalColorsDrift = ['#ff8a8a', '#ffd966', '#ffe0e6', '#d9b0ff'];
        for (let i = 0; i < 100; i++) {
            const mat = createFloatingPetalSprite(petalColorsDrift[Math.floor(Math.random() * petalColorsDrift.length)]);
            const sprite = new THREE.Sprite(mat);
            sprite.scale.set(0.13, 0.13, 1);
            sprite.position.set((Math.random() - 0.5) * 9, Math.random() * 2.5, (Math.random() - 0.5) * 8);
            scene.add(sprite);
            driftingPetals.push(sprite);
        }
        
        // ========== THE SPECIAL MESSAGE (CSS2D) ==========
        // "even though i can't get them right now, doesn't mean you dont deserve your own little corner where you can find them."
        const messageDiv = document.createElement('div');
        messageDiv.innerHTML = `✨ even though i can't get them right now, <br> doesn't mean you don't deserve your own little corner <br> where you can find them. ✨`;
        messageDiv.style.color = '#fff8f0';
        messageDiv.style.fontSize = '22px';
        messageDiv.style.fontWeight = '500';
        messageDiv.style.fontFamily = "'Dancing Script', 'Georgia', 'Segoe UI', cursive";
        messageDiv.style.textAlign = 'center';
        messageDiv.style.textShadow = '0 0 12px #ff69b4, 1px 1px 2px #440022';
        messageDiv.style.background = 'rgba(20, 20, 40, 0.45)';
        messageDiv.style.padding = '12px 24px';
        messageDiv.style.borderRadius = '60px';
        messageDiv.style.backdropFilter = 'blur(12px)';
        messageDiv.style.border = '1px solid rgba(255,200,200,0.3)';
        messageDiv.style.whiteSpace = 'nowrap';
        messageDiv.style.letterSpacing = '0.5px';
        // responsive wrap
        if (window.innerWidth < 700) {
            messageDiv.style.fontSize = '14px';
            messageDiv.style.whiteSpace = 'normal';
            messageDiv.style.maxWidth = '90vw';
            messageDiv.style.padding = '8px 16px';
        }
        const floatingMessage = new CSS2DObject(messageDiv);
        floatingMessage.position.set(0, 2.55, 0);
        scene.add(floatingMessage);
        
        // Additional small poetic tag near ground
        const tinySignDiv = document.createElement('div');
        tinySignDiv.textContent = '🌸 a garden just for you 🌸';
        tinySignDiv.style.color = '#ffefcf';
        tinySignDiv.style.fontSize = '14px';
        tinySignDiv.style.fontFamily = "'Dancing Script', cursive";
        tinySignDiv.style.background = 'rgba(0,0,0,0.3)';
        tinySignDiv.style.padding = '4px 12px';
        tinySignDiv.style.borderRadius = '30px';
        tinySignDiv.style.backdropFilter = 'blur(4px)';
        const groundSign = new CSS2DObject(tinySignDiv);
        groundSign.position.set(2.2, 0.25, 2.4);
        scene.add(groundSign);
        
        // --- Growth animation (all tulips start from tiny and bloom)---
        let growthStart = performance.now();
        let growthProgress = 0;
        const growthDuration = 2800;
        allTulips.forEach(t => { t.scale.set(0, 0, 0); t.userData.grown = false; });
        
        // --- subtle sway and sparkle motion ---
        let clock = new THREE.Clock();
        
        // --- ANIMATION LOOP: Growth then gentle movements ---
        function animate() {
            const now = performance.now();
            const elapsed = now - growthStart;
            let t = Math.min(1, elapsed / growthDuration);
            const easeOut = 1 - Math.pow(1 - t, 3);
            
            if (t < 1) {
                allTulips.forEach(tulip => {
                    tulip.scale.set(easeOut, easeOut, easeOut);
                });
                // animate light intensity during bloom
                const glowIntensity = 0.35 + easeOut * 0.65;
                fillLight.intensity = 0.5 + easeOut * 0.4;
                rimLight.intensity = 0.6 + easeOut * 0.5;
                colorFill.intensity = 0.4 + easeOut * 0.4;
            } else {
                if (allTulips[0] && allTulips[0].scale.x !== 1) {
                    allTulips.forEach(tulip => tulip.scale.set(1, 1, 1));
                }
                // Post-growth: gentle swaying and drifting petals
                const delta = clock.getDelta();
                const time = performance.now() * 0.002;
                allTulips.forEach(tulip => {
                    if (tulip.userData.swaySpeed) {
                        const swayX = Math.sin(time * tulip.userData.swaySpeed + tulip.userData.phase) * 0.008;
                        const swayZ = Math.cos(time * tulip.userData.swaySpeed * 0.65 + tulip.userData.phase) * 0.006;
                        tulip.rotation.x = swayX * 0.6;
                        tulip.rotation.z = swayZ;
                    }
                });
                
                // floating petals drift
                driftingPetals.forEach((petal, idx) => {
                    petal.position.y += 0.0022;
                    petal.material.rotation += 0.012;
                    if (petal.position.y > 2.9) petal.position.y = 0.15;
                    petal.position.x += Math.sin(time + idx) * 0.002;
                    petal.position.z += Math.cos(time * 0.6 + idx) * 0.002;
                });
                
                // rotate sparkles softly
                sparkles.rotation.y += 0.002;
                heartDust.rotation.y -= 0.0015;
                const pulse = 0.7 + Math.sin(time * 3.2) * 0.2;
                warmFill.intensity = 0.45 + Math.sin(time * 2.1) * 0.12;
                colorFill.intensity = 0.5 + Math.sin(time * 2.5) * 0.15;
            }
            
            // gentle floating message animation
            const floatY = Math.sin(Date.now() * 0.0015) * 0.02;
            floatingMessage.position.y = 2.55 + floatY;
            groundSign.position.y = 0.25 + Math.sin(Date.now() * 0.0012) * 0.01;
            
            controls.update(); // update orbit controls
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // --- Bloom celebration effect: small particle burst at start---
        setTimeout(() => {
            const burstCount = 400;
            const burstGeo = new THREE.BufferGeometry();
            const burstPositions = new Float32Array(burstCount * 3);
            for (let i = 0; i < burstCount; i++) {
                burstPositions[i*3] = (Math.random() - 0.5) * 3;
                burstPositions[i*3+1] = Math.random() * 2;
                burstPositions[i*3+2] = (Math.random() - 0.5) * 3;
            }
            burstGeo.setAttribute('position', new THREE.BufferAttribute(burstPositions, 3));
            const burstMat = new THREE.PointsMaterial({ color: 0xffaacc, size: 0.045, blending: THREE.AdditiveBlending });
            const burstPoints = new THREE.Points(burstGeo, burstMat);
            scene.add(burstPoints);
            setTimeout(() => scene.remove(burstPoints), 1400);
        }, 400);
        
        // resize handler
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            if (window.innerWidth < 700) {
                messageDiv.style.fontSize = '14px';
                messageDiv.style.whiteSpace = 'normal';
                messageDiv.style.maxWidth = '90vw';
            } else {
                messageDiv.style.fontSize = '22px';
                messageDiv.style.whiteSpace = 'nowrap';
            }
        }
        
        console.log("%c💖 A hidden garden of tulips blooms for you, special soul. 💖", "color: #ffaacc; font-size: 15px; font-weight: bold;");
    </script>
</body>
</html>
