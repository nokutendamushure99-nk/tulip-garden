<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Tulip Garden 💜</title>

<style>
body { margin:0; overflow:hidden; background:#050d1f; }
.messageBox {
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    padding:12px 20px;
    border-radius:30px;
    background:rgba(0,0,0,0.6);
    color:white;
    display:none;
}
</style>
</head>

<body>
<div class="messageBox" id="msgBox"></div>

<script type="importmap">
{
 "imports": {
  "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.152.2/examples/jsm/"
 }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

/* SCENE */
const scene = new THREE.Scene();
scene.background = new THREE.Color("#0a1f44");

/* CAMERA */
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight,0.1,100);
camera.position.set(5,4,6);

/* RENDERER */
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

/* CONTROLS */
const controls = new OrbitControls(camera, renderer.domElement);

/* LIGHTING (REALISTIC) */
scene.add(new THREE.AmbientLight(0xffffff,0.6));

const sun = new THREE.DirectionalLight(0xfff0cc,1.2);
sun.position.set(5,10,5);
scene.add(sun);

/* GROUND */
const ground = new THREE.Mesh(
    new THREE.CircleGeometry(8,32),
    new THREE.MeshStandardMaterial({color:0x4caf50})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* LOADER */
const loader = new GLTFLoader();

const tulips = [];
const messages = [
 "this one reminded me of you",
 "you deserve soft things",
 "i'd pick this one for you",
 "gentle but strong 🌸"
];

/* LOAD MODEL */
loader.load(
'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Flower/glTF/Flower.gltf',
(gltf)=>{
    const model = gltf.scene;

    for(let i=0;i<25;i++){
        const clone = model.clone(true);

        clone.position.set(
            (Math.random()-0.5)*7,
            0,
            (Math.random()-0.5)*7
        );

        clone.scale.set(0.5,0.5,0.5);

        clone.userData.message = messages[Math.floor(Math.random()*messages.length)];

        scene.add(clone);
        tulips.push(clone);
    }

    /* SPECIAL PURPLE */
    const special = model.clone(true);
    special.position.set(0,0,0);
    special.scale.set(0.6,0.6,0.6);

    special.traverse(child=>{
        if(child.isMesh){
            child.material = child.material.clone();
            child.material.color.set(0xcd96ff);
            child.material.emissive = new THREE.Color(0x9933ff);
            child.material.emissiveIntensity = 0.6;
        }
    });

    special.userData.message = "this one is different... just like you 💜";

    scene.add(special);
    tulips.push(special);
});

/* RAYCAST */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('click',(e)=>{
    mouse.x = (e.clientX / innerWidth)*2 -1;
    mouse.y = -(e.clientY / innerHeight)*2 +1;

    raycaster.setFromCamera(mouse,camera);
    const hits = raycaster.intersectObjects(tulips,true);

    if(hits.length){
        showMessage(hits[0].object.parent.userData.message);
    }
});

function showMessage(text){
    const box = document.getElementById("msgBox");
    box.innerText = text;
    box.style.display="block";
    setTimeout(()=>box.style.display="none",3000);
}

/* WIND */
let t = 0;
function animate(){
    requestAnimationFrame(animate);

    t += 0.01;

    tulips.forEach(fl=>{
        fl.rotation.z = Math.sin(t + fl.position.x)*0.03;
    });

    renderer.render(scene,camera);
}
animate();

/* RESIZE */
addEventListener('resize',()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
