<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enchanted Tulip Garden ✨</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', 'Georgia', serif;
    background: radial-gradient(circle at 50% 20%, #102a54, #050d1f);
}

.controls-note {
    position: absolute;
    bottom: 20px;
    right: 20px;
    color: rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.35);
    padding: 6px 14px;
    border-radius: 30px;
    font-size: 12px;
    backdrop-filter: blur(6px);
}

.message {
    color: #fff8f0;
    font-size: 20px;
    text-align: center;
    padding: 12px 20px;
    border-radius: 50px;
    background: rgba(20,20,40,0.4);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,200,200,0.2);
    text-shadow: 0 0 10px rgba(255,105,180,0.6);
}
</style>
</head>

<body>
<div class="controls-note">🌸 drag | scroll</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

/* ------------------ SCENE ------------------ */
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a1f44, 0.018);

/* ------------------ CAMERA ------------------ */
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);
camera.position.set(5,4,6);

/* ------------------ RENDERER ------------------ */
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

/* ------------------ LABEL RENDERER ------------------ */
const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(innerWidth, innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = 0;
document.body.appendChild(labelRenderer.domElement);

/* ------------------ CONTROLS ------------------ */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

/* ------------------ LIGHTING (IMPROVED BALANCE) ------------------ */
scene.add(new THREE.AmbientLight(0x445577, 0.6));

const sun = new THREE.DirectionalLight(0xffe8c5, 1.1);
sun.position.set(5,8,3);
sun.castShadow = true;
scene.add(sun);

const rim = new THREE.PointLight(0xffb6c1, 0.6, 10);
rim.position.set(-2,3,-3);
scene.add(rim);

/* ------------------ GROUND ------------------ */
const ground = new THREE.Mesh(
    new THREE.CircleGeometry(8, 32),
    new THREE.MeshStandardMaterial({ color:0x4caf50, roughness:0.9 })
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

/* ------------------ WIND SYSTEM (NEW) ------------------ */
let windTime = 0;
function getWindOffset(x,z){
    return Math.sin(windTime + x*0.5 + z*0.5) * 0.03;
}

/* ------------------ TULIP ------------------ */
function createTulip(color){
    const group = new THREE.Group();

    const stem = new THREE.Mesh(
        new THREE.CylinderGeometry(0.05,0.08,1.2,8),
        new THREE.MeshStandardMaterial({ color:0x5fad4a })
    );
    stem.position.y = 0.6;
    group.add(stem);

    const petalMat = new THREE.MeshStandardMaterial({
        color,
        roughness:0.3,
        emissive:color,
        emissiveIntensity:0.1
    });

    for(let i=0;i<6;i++){
        const petal = new THREE.Mesh(
            new THREE.SphereGeometry(0.25,8,8),
            petalMat
        );
        const a = i/6 * Math.PI*2;
        petal.position.set(Math.cos(a)*0.2,1.2,Math.sin(a)*0.2);
        group.add(petal);
    }

    group.userData.baseY = group.position.y;
    return group;
}

/* ------------------ CREATE FIELD ------------------ */
const colors = [0xff4d4d,0xffd966,0xffffff,0xcd96ff];
const tulips = [];

for(let i=0;i<40;i++){
    const t = createTulip(colors[i%4]);
    t.position.set(
        (Math.random()-0.5)*7,
        0,
        (Math.random()-0.5)*7
    );
    scene.add(t);
    tulips.push(t);
}

/* ------------------ FLOATING MESSAGE ------------------ */
const msg = document.createElement('div');
msg.className = "message";
msg.innerHTML = `
even though i can't get them right now,<br>
you still deserve your own little place 🌸
`;
const label = new CSS2DObject(msg);
label.position.set(0,2.5,0);
scene.add(label);

/* ------------------ PARTICLES ------------------ */
const starsGeo = new THREE.BufferGeometry();
const starCount = 1000;
const starPos = new Float32Array(starCount*3);

for(let i=0;i<starCount;i++){
    starPos[i*3] = (Math.random()-0.5)*10;
    starPos[i*3+1] = Math.random()*4;
    starPos[i*3+2] = (Math.random()-0.5)*10;
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));

const stars = new THREE.Points(
    starsGeo,
    new THREE.PointsMaterial({ size:0.03 })
);
scene.add(stars);

/* ------------------ ANIMATION ------------------ */
function animate(){
    requestAnimationFrame(animate);

    windTime += 0.02;

    tulips.forEach(t=>{
        const sway = getWindOffset(t.position.x, t.position.z);
        t.rotation.z = sway;
    });

    stars.rotation.y += 0.001;

    controls.update();
    renderer.render(scene,camera);
    labelRenderer.render(scene,camera);
}
animate();

/* ------------------ RESIZE ------------------ */
addEventListener('resize',()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
    labelRenderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
